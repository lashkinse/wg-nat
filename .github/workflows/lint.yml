name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck + shfmt
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt
      - name: shellcheck
        run: |
          cd nat.d
          shellcheck -s bash -x ./*.sh
          cd ..
          shellcheck -s bash apply-nat.sh
      - name: shfmt (4-space indent, case indent)
        run: shfmt -d -i 4 -ci apply-nat.sh nat.d/*.sh
